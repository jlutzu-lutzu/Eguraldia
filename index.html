<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0E2A33">
<title>Eguraldia · Hondarribia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --marea:#0E2A33;
    --panel:#143942;
    --panel-2:#0B2228;
    --bruma:#EAF1F0;
    --slate:#7C9AA0;
    --slate-2:#557078;
    --bidasoa:#4FB3B8;
    --galerna:#E8A33D;
    --line:#21474F;
    --lluvia:#5BA3D0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--marea);
    color:var(--bruma);
    font-family:"Space Grotesk",system-ui,sans-serif;
    line-height:1.4;
    padding:22px 16px 40px;
    max-width:560px;margin:0 auto;
    min-height:100vh;
  }
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}

  header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:26px}
  .place{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--bidasoa);font-weight:500}
  h1{font-size:30px;font-weight:700;letter-spacing:-.01em;margin-top:2px}
  .coords{font-size:11px;color:var(--slate);letter-spacing:.04em;margin-top:3px}
  #refresh{
    flex:none;background:var(--panel);border:1px solid var(--line);color:var(--bruma);
    width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;
    display:grid;place-items:center;transition:transform .5s ease, background .2s;
  }
  #refresh:hover{background:var(--panel-2)}
  #refresh:focus-visible{outline:2px solid var(--bidasoa);outline-offset:2px}
  #refresh.spin{transform:rotate(360deg)}

  section{margin-bottom:26px}
  .eyebrow{
    display:flex;align-items:baseline;gap:8px;margin-bottom:12px;
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);font-weight:500;
  }
  .eyebrow .model{color:var(--galerna)}
  .eyebrow .sub{margin-left:auto;font-size:10px;letter-spacing:.06em;color:var(--slate-2);text-transform:none}

  .now{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:20px;display:flex;align-items:center;gap:14px;
  }
  .now-temp{flex:1;min-width:0}
  .now-temp .big{font-size:60px;font-weight:500;line-height:.95;letter-spacing:-.02em}
  .now-temp .big span{font-size:26px;color:var(--slate)}
  .now-temp .feels{font-size:12px;color:var(--slate);margin-top:6px;letter-spacing:.02em}

  .compass{flex:none;width:118px;height:118px;position:relative}
  .compass svg{width:100%;height:100%;display:block}
  .compass .rdir{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .compass .spd{font-size:23px;font-weight:600;line-height:1}
  .compass .spd small{font-size:10px;color:var(--slate);font-weight:400}
  .compass .card{font-size:11px;letter-spacing:.12em;color:var(--galerna);margin-top:2px;font-weight:600}

  .now-foot{display:flex;border-top:1px solid var(--line);margin-top:4px}
  .metric{flex:1;padding:14px 6px 2px;text-align:center}
  .metric + .metric{border-left:1px solid var(--line)}
  .metric .v{font-size:19px;font-weight:500}
  .metric .v.mono{font-weight:500}
  .metric .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-top:3px}
  .now-wrap{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .now-wrap .now{border:0;border-radius:0}

  .strip{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
  .strip::-webkit-scrollbar{height:5px}
  .strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .cell{
    flex:none;width:64px;scroll-snap-align:start;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:9px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .cell.day0{border-color:var(--line)}
  .cell .hr{font-size:11px;color:var(--slate);letter-spacing:.03em}
  .cell .hr b{color:var(--bruma);font-weight:600;text-transform:capitalize}
  .cell .t{font-size:17px;font-weight:500}
  .cell .arrow{color:var(--galerna)}
  .cell .ws{font-size:11px;color:var(--slate)}
  .cell .pr{font-size:10px;color:var(--lluvia);min-height:13px}
  .cell .pr.dry{color:var(--slate-2)}
  .cell .hu{font-size:10px;color:var(--bidasoa)}

  .arrow{display:inline-block;line-height:0;transition:transform .4s ease}
  .arrow svg{display:block}

  .days{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .row{display:grid;grid-template-columns:64px 1fr 46px 50px;align-items:center;gap:10px;padding:12px 14px}
  .row + .row{border-top:1px solid var(--line)}
  .row .date{font-size:12px;line-height:1.25}
  .row .date b{display:block;font-size:13px;font-weight:600;text-transform:capitalize}
  .row .date span{color:var(--slate);font-size:11px}
  .range{position:relative}
  .range .nums{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .range .nums .mn{color:var(--slate)}
  .range .track{height:4px;background:var(--panel-2);border-radius:3px;position:relative;overflow:hidden}
  .range .fill{position:absolute;top:0;bottom:0;border-radius:3px;
    background:linear-gradient(90deg,var(--bidasoa),var(--galerna))}
  .row .wind{text-align:center;font-size:11px;color:var(--slate)}
  .row .wind .arrow{color:var(--galerna)}
  .row .wind .ws{display:block;margin-top:1px}
  .row .rain{text-align:right;font-size:12px}
  .row .rain .mm{color:var(--lluvia);font-weight:500}
  .row .rain .mm.dry{color:var(--slate-2)}
  .row .rain .hu{display:block;color:var(--bidasoa);font-size:10px;margin-top:2px}

  .state{padding:30px 16px;text-align:center;color:var(--slate);font-size:14px}
  .state button{margin-top:12px;background:var(--galerna);color:#1a1206;border:0;padding:10px 18px;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit}
  .skeleton{background:var(--panel);border:1px solid var(--line);border-radius:18px;height:150px;
    animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:.85}}

  footer{margin-top:30px;text-align:center;font-size:10.5px;color:var(--slate-2);letter-spacing:.04em;line-height:1.6}
  footer a{color:var(--slate);text-decoration:none}

  .reveal{opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
  .reveal.d1{animation-delay:.05s}.reveal.d2{animation-delay:.12s}.reveal.d3{animation-delay:.19s}
  @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .reveal{animation:none;opacity:1;transform:none}
    .arrow,#refresh{transition:none}
  }
</style>
</head>
<body>
  <header>
    <div>
      <div class="place">Txingudi · Hondarribia</div>
      <h1>Eguraldia</h1>
      <div class="coords mono" id="coords">43.37°I · 1.79°M</div>
    </div>
    <button id="refresh" title="Eguneratu" aria-label="Irakurketak eguneratu">↻</button>
  </header>

  <section id="now-section">
    <div class="eyebrow">Orain <span class="sub">interpolaziozko estimazioa</span></div>
    <div id="now"><div class="skeleton"></div></div>
  </section>

  <section id="arome-section">
    <div class="eyebrow">Hurrengo orduak · <span class="model">AROME</span> <span class="sub" id="arome-sub"></span></div>
    <div id="arome"><div class="skeleton" style="height:120px"></div></div>
  </section>

  <section id="ecmwf-section">
    <div class="eyebrow">10 egun · <span class="model">ECMWF</span> <span class="sub">eguneko laburpena</span></div>
    <div id="ecmwf"><div class="skeleton" style="height:380px"></div></div>
  </section>

  <footer>
    Datuak: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · AROME (Météo-France) eta IFS (ECMWF) ereduak · CC BY 4.0<br>
    «Orain» = koordenadetara interpolatutako eredua, ez estazioko irakurketa.
  </footer>

<script>
const LAT = 43.365, LON = -1.791;
const CARD = ['I','IIE','IE','EIE','E','EHE','HE','HHE','H','HHM','HM','MHM','M','MIM','IM','IIM'];
const cardinal = d => (d==null) ? '—' : CARD[Math.round(d/22.5)%16];

function arrow(deg, size=13, color='currentColor'){
  if(deg==null) return '';
  return `<span class="arrow" style="transform:rotate(${deg}deg)">`+
    `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" `+
    `stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">`+
    `<path d="M12 3 L12 21 M12 3 L7 9 M12 3 L17 9"/></svg></span>`;
}
const f = (v,d=0) => (v==null||Number.isNaN(v)) ? '—' : v.toFixed(d);

async function getJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  if(j.error) throw new Error(j.reason||'API error');
  return j;
}

const base = `latitude=${LAT}&longitude=${LON}&timezone=auto&wind_speed_unit=kmh`;
const URLS = {
  now: `https://api.open-meteo.com/v1/forecast?${base}`+
       `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,precipitation`,
  arome: `https://api.open-meteo.com/v1/forecast?${base}`+
       `&models=meteofrance_arome_france_hd&forecast_days=3`+
       `&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,precipitation`,
  ecmwf: `https://api.open-meteo.com/v1/forecast?${base}`+
       `&models=ecmwf_ifs025&forecast_days=10`+
       `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,wind_direction_10m_dominant`+
       `&hourly=relative_humidity_2m`
};

function renderNow(j){
  const c = j.current;
  const dir = c.wind_direction_10m;
  const html = `
   <div class="now-wrap reveal d1">
    <div class="now">
      <div class="now-temp">
        <div class="big mono">${f(c.temperature_2m)}<span>°C</span></div>
        <div class="feels">Sentsazioa ${f(c.apparent_temperature)}°</div>
      </div>
      <div class="compass">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="47" fill="none" stroke="var(--line)" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="var(--line)" stroke-width="1" opacity=".6"/>
          ${[0,90,180,270].map(a=>`<line x1="50" y1="5" x2="50" y2="12"
             transform="rotate(${a} 50 50)" stroke="var(--slate-2)" stroke-width="1.5"/>`).join('')}
          <text x="50" y="17" text-anchor="middle" font-size="8" fill="var(--slate)" font-family="IBM Plex Mono">I</text>
          <g transform="rotate(${dir==null?0:dir} 50 50)">
            <path d="M50 13 L45 27 L50 23 L55 27 Z" fill="var(--galerna)"/>
          </g>
        </svg>
        <div class="rdir">
          <div class="spd mono">${f(c.wind_speed_10m)}<small> km/h</small></div>
          <div class="card">${cardinal(dir)}</div>
        </div>
      </div>
    </div>
    <div class="now-foot">
      <div class="metric"><div class="v mono">${f(c.relative_humidity_2m)}%</div><div class="k">Hezetasuna</div></div>
      <div class="metric"><div class="v mono">${f(c.precipitation,1)}<span style="font-size:12px;color:var(--slate)"> mm</span></div><div class="k">Euria 1 h</div></div>
      <div class="metric"><div class="v">${cardinal(dir)} ${arrow(dir,12,'var(--galerna)')}</div><div class="k">Haizea</div></div>
    </div>
   </div>`;
  document.getElementById('now').innerHTML = html;
}

function renderArome(j){
  const h = j.hourly, n = h.time.length;
  const now = Date.now();
  let cells = '', count = 0, lastDay = null, firstISO=null, lastISO=null;
  for(let i=0;i<n;i++){
    if(h.temperature_2m[i]==null) continue;
    const t = new Date(h.time[i]);
    if(t.getTime() < now - 3600e3) continue;
    if(firstISO==null) firstISO=t;
    lastISO=t;
    const hh = t.getHours();
    const day = t.getDate();
    const newDay = day!==lastDay; lastDay=day;
    const hrLabel = newDay
      ? `<b>${t.toLocaleDateString('eu',{weekday:'short'})}</b>`
      : `${String(hh).padStart(2,'0')}h`;
    const pr = h.precipitation[i];
    const prTxt = (pr>0) ? `${pr.toFixed(1)} mm` : '·';
    cells += `
      <div class="cell ${count===0?'day0':''}">
        <div class="hr">${hrLabel}</div>
        <div class="t mono">${f(h.temperature_2m[i])}°</div>
        ${arrow(h.wind_direction_10m[i],14,'var(--galerna)')}
        <div class="ws mono">${f(h.wind_speed_10m[i])}</div>
        <div class="pr ${pr>0?'':'dry'}">${prTxt}</div>
        <div class="hu mono">${f(h.relative_humidity_2m[i])}%</div>
      </div>`;
    count++;
  }
  if(count===0){ document.getElementById('arome').innerHTML =
    `<div class="state">AROMEk ez du daturik ematen une honetan puntu honetarako.</div>`; return; }
  document.getElementById('arome').innerHTML = `<div class="strip reveal d2">${cells}</div>`;
  const hrs = Math.round((lastISO - firstISO)/3600e3);
  document.getElementById('arome-sub').textContent = `~${hrs} h-ko irismena · ${count} urrats`;
}

function dailyMeanRH(j){
  const map = {};
  const h = j.hourly;
  if(!h || !h.relative_humidity_2m) return map;
  for(let i=0;i<h.time.length;i++){
    const d = h.time[i].slice(0,10);
    const v = h.relative_humidity_2m[i];
    if(v==null) continue;
    (map[d] = map[d] || []).push(v);
  }
  for(const d in map){ const a=map[d]; map[d]=a.reduce((x,y)=>x+y,0)/a.length; }
  return map;
}
function renderEcmwf(j){
  const d = j.daily, n = d.time.length;
  const rh = dailyMeanRH(j);
  let gmin=Infinity, gmax=-Infinity;
  for(let i=0;i<n;i++){ gmin=Math.min(gmin,d.temperature_2m_min[i]); gmax=Math.max(gmax,d.temperature_2m_max[i]); }
  const span = (gmax-gmin)||1;
  let rows='';
  for(let i=0;i<n;i++){
    const date = new Date(d.time[i]+'T00:00');
    const wd = date.toLocaleDateString('eu',{weekday:'short'});
    const dm = date.toLocaleDateString('eu',{day:'numeric',month:'short'});
    const mn=d.temperature_2m_min[i], mx=d.temperature_2m_max[i];
    const left=((mn-gmin)/span)*100, w=((mx-mn)/span)*100;
    const pr=d.precipitation_sum[i];
    const hu=rh[d.time[i]];
    const dir=d.wind_direction_10m_dominant[i];
    rows += `
      <div class="row">
        <div class="date"><b>${wd}</b><span>${dm}</span></div>
        <div class="range">
          <div class="nums mono"><span class="mn">${f(mn)}°</span><span>${f(mx)}°</span></div>
          <div class="track"><div class="fill" style="left:${left}%;width:${Math.max(w,3)}%"></div></div>
        </div>
        <div class="wind">${arrow(dir,13,'var(--galerna)')}<span class="ws mono">${f(d.wind_speed_10m_max[i])}</span></div>
        <div class="rain">
          <span class="mm mono ${pr>0?'':'dry'}">${pr>0?pr.toFixed(1)+' mm':'·'}</span>
          <span class="hu mono">${hu!=null?Math.round(hu)+'% hez.':''}</span>
        </div>
      </div>`;
  }
  document.getElementById('ecmwf').innerHTML = `<div class="days reveal d3">${rows}</div>`;
}

function fail(id,msg){
  document.getElementById(id).innerHTML =
    `<div class="state">${msg}<br><button onclick="load()">Saiatu berriro</button></div>`;
}

async function load(){
  const btn=document.getElementById('refresh'); btn.classList.add('spin');
  setTimeout(()=>btn.classList.remove('spin'),550);
  getJSON(URLS.now).then(renderNow).catch(()=>fail('now','Ezin izan da uneko datua kargatu.'));
  getJSON(URLS.arome).then(renderArome).catch(()=>fail('arome','Ezin izan da AROME kargatu.'));
  getJSON(URLS.ecmwf).then(renderEcmwf).catch(()=>fail('ecmwf','Ezin izan da ECMWF kargatu.'));
}

document.getElementById('refresh').addEventListener('click', load);
load();
</script>
</body>
</html>
